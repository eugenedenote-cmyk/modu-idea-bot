name: Idea Scraper

on:
  schedule:
    - cron: '*/29 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN }}
        run: python idea_scraper.py

      - name: Commit updated state
        run: |
          git config user.name "idea-bot"
          git config user.email "bot@noreply.github.com"
          git add seen_ideas.json
          git diff --staged --quiet || git commit -m "chore: update seen_ideas"
          git push
